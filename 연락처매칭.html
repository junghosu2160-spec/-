<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연락처-학생 매칭 도구 · 델타수학 전문학원</title>
<style>
  :root{
    --color-bg:#F5F6FA; --color-surface:#FFFFFF; --color-surface-alt:#EEF1F7; --color-border:#E3E6ED;
    --color-primary:#161616; --color-accent:#FFC531; --color-accent-dark:#E6A800;
    --color-text:#1F2937; --color-text-muted:#6B7280;
    --color-success:#2E9E6C; --color-success-soft:#E4F5EC;
    --color-warning:#C98A2E; --color-warning-soft:#FBF0DE;
    --color-danger:#D64550; --color-danger-soft:#FBE7E8;
    --radius-sm:8px; --radius-md:12px; --radius-lg:18px;
    --font-sans:-apple-system,BlinkMacSystemFont,"Pretendard Variable",Pretendard,"Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);}
  .wrap{max-width:860px;margin:0 auto;padding:24px 16px 80px;}
  h1{font-size:19px;font-weight:800;margin:0 0 4px;}
  .sub{font-size:12.5px;color:var(--color-text-muted);margin:0 0 20px;}
  .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:18px;margin-bottom:16px;}
  .card-title{font-size:14px;font-weight:800;margin:0 0 10px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .hint{font-size:11.5px;color:var(--color-text-muted);font-weight:400;}
  .btn{padding:9px 16px;border-radius:8px;border:1px solid transparent;font-size:13px;font-weight:700;cursor:pointer;background:#fff;}
  .btn-primary{background:var(--color-primary);color:#fff;}
  .btn-ghost{background:#fff;color:var(--color-text);border-color:var(--color-border);}
  .btn-sm{padding:6px 11px;font-size:12px;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px;}
  .stat{background:var(--color-surface-alt);border-radius:10px;padding:12px;text-align:center;}
  .stat .n{font-size:20px;font-weight:800;}
  .stat .l{font-size:11px;color:var(--color-text-muted);margin-top:2px;}

  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 8px;border-bottom:1px solid var(--color-surface-alt);font-size:13px;}
  .row:last-child{border-bottom:none;}
  .row .orig{flex:1 1 150px;color:var(--color-text-muted);font-size:12px;}
  .row .arrow{color:#C9CDD3;}
  .row .stuname{flex:0 0 auto;font-weight:800;min-width:60px;}
  .row select{flex:0 0 auto;padding:6px 8px;border:1px solid var(--color-border);border-radius:6px;font-size:12px;max-width:160px;}
  .tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;flex:0 0 auto;}
  .tag.student{background:var(--color-accent);color:#5c4400;}
  .tag.parent{background:#E6F1FB;color:#0C447C;}
  .phone{font-size:12px;color:var(--color-text-muted);flex:0 0 auto;font-variant-numeric:tabular-nums;}
  .row input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex:0 0 auto;}
  .empty-msg{text-align:center;color:var(--color-text-muted);font-size:13px;padding:20px;}
  .toggle-others{cursor:pointer;color:var(--color-primary);font-weight:700;font-size:12.5px;text-decoration:underline;}
  #applyResult{font-size:12.5px;margin-top:10px;color:var(--color-success);font-weight:700;display:none;}
</style>
</head>
<body>

<div class="wrap">
  <h1>📇 연락처 → 학생 정보 매칭 도구</h1>
  <p class="sub">휴대폰 연락처에서 뽑은 623건을 등록된 학생 명단과 자동으로 맞춰봤어요. 확인하고 체크된 것만 반영하시면 돼요.</p>

  <div class="card">
    <div class="stats">
      <div class="stat"><div class="n" id="statMatched">-</div><div class="l">자동 매칭됨</div></div>
      <div class="stat"><div class="n" id="statAmbiguous">-</div><div class="l">후보 여러 명 (확인 필요)</div></div>
      <div class="stat"><div class="n" id="statUnmatched">-</div><div class="l">매칭 안 됨</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">✅ 자동 매칭됨 <span class="hint">기본으로 체크되어 있어요, 필요 없으면 해제하세요</span></div>
    <div id="matchedList"></div>
  </div>

  <div class="card">
    <div class="card-title">⚠️ 후보 여러 명 — 직접 골라주세요</div>
    <div id="ambiguousList"></div>
  </div>

  <div class="card">
    <div class="card-title" style="cursor:pointer;" onclick="toggleUnmatched()">
      <span id="unmatchedToggleIcon">▸</span> 매칭 안 된 연락처 (참고용) <span class="hint" id="unmatchedCountHint"></span>
    </div>
    <div id="unmatchedList" style="display:none;"></div>
  </div>

  <div class="card" style="position:sticky;bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.12);">
    <div class="card-title" style="margin:0;">
      <span>선택된 항목을 학생 정보에 반영</span>
      <button class="btn btn-primary" onclick="applyMatches()">✓ 선택한 항목 반영하기</button>
    </div>
    <div id="applyResult"></div>
  </div>
</div>

const GRADE_TOKENS = ['초1','초2','초3','초4','초5','초6','중1','중2','중3','고1','고2','고3'];
const PARENT_MARKERS = ['어머님','어머니','엄마','맘','아버님','아버지','아빠'];
const NOISE_WORDS = ['상담','문의','예약','방문','온라인','당근','예비','부모님','학생','쌍둥이','국제','신규','재원','퇴원','휴원','확인','안내','가능','불가','대기','완료','취소','문자','전화','카톡','수업','시간','시반'];

function extractCandidates(rawName){
  let s = rawName;
  let isParent = false;
  PARENT_MARKERS.forEach(m => { if(s.includes(m)){ isParent = true; s = s.split(m).join(' '); } });
  GRADE_TOKENS.forEach(g => { s = s.split(g).join(' '); });
  s = s.replace(/[()·ㅡ\-\/\d?!.,~♡★☆_=]/g, ' ');
  const tokens = s.split(/\s+/).filter(Boolean);
  const candidates = tokens.filter(t => /^[가-힣]{2,4}$/.test(t) && !NOISE_WORDS.includes(t));
  return { candidates: [...new Set(candidates)], isParent };
}

function findStudentMatches(candidate, list){
  return list.filter(s => s.name === candidate || (s.name.length - candidate.length === 1 && s.name.endsWith(candidate)));
}

let matchedRows = [];   // {contact, student, field, key}
let ambiguousRows = []; // {contact, candidates:[student,...], field}
let unmatchedRows = []; // {contact}

function runMatching(){
  matchedRows = [];
  ambiguousRows = [];
  unmatchedRows = [];

  CONTACTS.forEach(contact => {
    const { candidates, isParent } = extractCandidates(contact.name);
    const field = isParent ? 'parentPhone' : 'phone';
    let allMatched = [];
    candidates.forEach(c => {
      findStudentMatches(c, students).forEach(s => {
        if(!allMatched.some(m => m.id === s.id)) allMatched.push(s);
      });
    });

    if(allMatched.length === 1){
      matchedRows.push({ contact, student: allMatched[0], field });
    }else if(allMatched.length > 1){
      ambiguousRows.push({ contact, candidates: allMatched, field });
    }else{
      unmatchedRows.push({ contact });
    }
  });

  renderAll();
}

function fieldTag(field){
  return field === 'parentPhone'
    ? '<span class="tag parent">학부모</span>'
    : '<span class="tag student">학생</span>';
}

function renderAll(){
  document.getElementById('statMatched').textContent = matchedRows.length;
  document.getElementById('statAmbiguous').textContent = ambiguousRows.length;
  document.getElementById('statUnmatched').textContent = unmatchedRows.length;

  const matchedBox = document.getElementById('matchedList');
  matchedBox.innerHTML = matchedRows.length ? matchedRows.map((r, i) => `
    <div class="row">
      <input type="checkbox" checked data-kind="matched" data-idx="${i}">
      <span class="orig">${escapeHtml(r.contact.name)}</span>
      <span class="arrow">→</span>
      <span class="stuname">${escapeHtml(r.student.name)}</span>
      ${fieldTag(r.field)}
      <span class="phone">${escapeHtml(r.contact.phone)}</span>
    </div>
  `).join('') : `<div class="empty-msg">자동 매칭된 항목이 없습니다.</div>`;

  const ambigBox = document.getElementById('ambiguousList');
  ambigBox.innerHTML = ambiguousRows.length ? ambiguousRows.map((r, i) => `
    <div class="row">
      <input type="checkbox" data-kind="ambiguous" data-idx="${i}">
      <span class="orig">${escapeHtml(r.contact.name)}</span>
      <span class="arrow">→</span>
      <select data-kind="ambiguous-select" data-idx="${i}">
        <option value="">선택 안 함</option>
        ${r.candidates.map(s => `<option value="${s.id}">${escapeHtml(s.name)} (${escapeHtml(s.grade)}, ${escapeHtml(s.school)})</option>`).join('')}
      </select>
      ${fieldTag(r.field)}
      <span class="phone">${escapeHtml(r.contact.phone)}</span>
    </div>
  `).join('') : `<div class="empty-msg">확인이 필요한 항목이 없습니다.</div>`;

  const unmatchedCountHint = document.getElementById('unmatchedCountHint');
  unmatchedCountHint.textContent = `(${unmatchedRows.length}건)`;
  const unmatchedBox = document.getElementById('unmatchedList');
  unmatchedBox.innerHTML = unmatchedRows.length ? unmatchedRows.map(r => `
    <div class="row">
      <span class="orig" style="flex:1;">${escapeHtml(r.contact.name)}</span>
      <span class="phone">${escapeHtml(r.contact.phone)}</span>
    </div>
  `).join('') : `<div class="empty-msg">없음</div>`;
}

function toggleUnmatched(){
  const box = document.getElementById('unmatchedList');
  const icon = document.getElementById('unmatchedToggleIcon');
  const isOpen = box.style.display !== 'none';
  box.style.display = isOpen ? 'none' : 'block';
  icon.textContent = isOpen ? '▸' : '▾';
}

function applyMatches(){
  const updates = {}; // studentId -> {phone, parentPhone}

  // 자동 매칭된 것 중 체크된 것
  document.querySelectorAll('input[data-kind="matched"]:checked').forEach(cb => {
    const r = matchedRows[parseInt(cb.dataset.idx, 10)];
    if(!updates[r.student.id]) updates[r.student.id] = {};
    updates[r.student.id][r.field] = r.contact.phone;
  });

  // 후보 여러명 중 체크 + 선택된 것
  document.querySelectorAll('input[data-kind="ambiguous"]:checked').forEach(cb => {
    const idx = cb.dataset.idx;
    const sel = document.querySelector(`select[data-idx="${idx}"][data-kind="ambiguous-select"]`);
    const studentId = sel ? sel.value : '';
    if(!studentId) return;
    const r = ambiguousRows[parseInt(idx, 10)];
    if(!updates[studentId]) updates[studentId] = {};
    updates[studentId][r.field] = r.contact.phone;
  });

  const ids = Object.keys(updates);
  if(!ids.length){ alert('반영할 항목을 선택해 주세요.'); return; }
  if(!confirm(`${ids.length}명의 학생 정보에 연락처를 반영하시겠습니까?\n(이미 입력되어 있던 연락처는 덮어쓰기 됩니다)`)) return;

  ids.forEach(id => {
    db.ref('students/' + id).update(updates[id]);
  });

  const resultEl = document.getElementById('applyResult');
  resultEl.style.display = 'block';
  resultEl.textContent = `✓ 학생 ${ids.length}명의 연락처를 반영했습니다. 관리자 페이지에서 확인해보세요.`;
}

db.ref('students').once('value').then(snap => {
  const val = snap.val() || {};
  students = Object.entries(val).map(([id, v]) => ({ id, ...v }));
  runMatching();
}).catch(err => {
  document.getElementById('matchedList').innerHTML = `<div class="empty-msg">학생 목록을 불러오지 못했습니다: ${err.message}</div>`;
});
</script>
