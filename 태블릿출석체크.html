<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>델타수학 전문학원 · 출석 체크</title>
<style>
  :root{
    --color-bg:#161616;
    --color-surface:#1F1F1F;
    --color-surface-alt:#292929;
    --color-border:#3A3A3A;
    --color-accent:#FFC531;
    --color-accent-dark:#E6A800;
    --color-text:#F5F5F5;
    --color-text-muted:#9A9A9A;
    --color-success:#3CC583;
    --color-warning:#FFB648;
    --color-danger:#FF6B6B;
    --font-sans:-apple-system,BlinkMacSystemFont,"Pretendard Variable",Pretendard,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:var(--font-sans);
    background:var(--color-bg);
    color:var(--color-text);
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}

  .screen{
    position:fixed;inset:0;
    display:none;
    flex-direction:column;
    padding:clamp(20px,4vw,48px);
  }
  .screen.active{display:flex;}

  /* ===== 헤더 ===== */
  .header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:clamp(16px,3vh,32px);
    flex-shrink:0;
  }
  .header-brand{display:flex;align-items:center;gap:14px;}
  .header-mark{width:44px;height:66px;flex-shrink:0;}
  .header-mark svg{width:100%;height:100%;display:block;}
  .header-title{font-size:clamp(18px,2.2vw,26px);font-weight:800;line-height:1.25;}
  .header-sub{font-size:clamp(11px,1.1vw,14px);color:var(--color-accent);font-weight:600;margin-top:2px;}
  .header-center{
    flex:1;text-align:center;color:var(--color-accent);font-weight:800;
    font-size:clamp(15px,2vw,22px);padding:0 16px;
  }
  .list-heading{
    font-size:clamp(15px,1.8vw,20px);font-weight:800;color:var(--color-text);
    margin-bottom:clamp(10px,1.6vh,16px);
  }
  .header-clock{text-align:right;}
  .header-time{font-size:clamp(22px,3vw,34px);font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:0.5px;}
  .header-date{font-size:clamp(11px,1.2vw,15px);color:var(--color-text-muted);margin-top:2px;}

  /* ===== 메인(명단) 화면 ===== */
  .search-wrap{flex-shrink:0;margin-bottom:clamp(14px,2.5vh,26px);}
  .search-input{
    width:100%;
    padding:clamp(14px,2vh,20px) 22px;
    font-size:clamp(18px,2vw,24px);
    border-radius:16px;
    border:2px solid var(--color-border);
    background:var(--color-surface);
    color:var(--color-text);
    outline:none;
  }
  .search-input::placeholder{color:var(--color-text-muted);}
  .search-input:focus{border-color:var(--color-accent);}

  .grid-scroll{flex:1;overflow-y:auto;padding-bottom:8px;}
  .name-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:clamp(10px,1.6vw,18px);
  }
  .name-tile{
    border:2px solid transparent;
    border-radius:18px;
    padding:clamp(16px,2.2vh,24px) 10px;
    text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    transition:transform .1s ease, border-color .1s ease, background .1s ease;
  }
  .name-tile:active{transform:scale(0.96);}

  /* 등원 완료: 초록으로 전환 (학년 상관없이 통일) */
  .name-tile.checked{background:#B9EFC9 !important;border-color:#3CC583;}
  .name-tile.checked .n{color:#0F5132 !important;}
  .name-tile.checked .g{background:rgba(15,81,50,0.16) !important;color:#0F5132 !important;}

  .name-tile .n{font-size:clamp(17px,1.9vw,22px);font-weight:800;}
  .name-tile .g{
    font-size:clamp(11px,1.1vw,13px);font-weight:700;
    padding:3px 10px;border-radius:999px;
  }
  .subgroup-title{
    font-size:clamp(11px,1.2vw,13px);font-weight:700;color:var(--color-text-muted);
    margin:10px 0 8px 0;
  }
  .name-tile .status-tag{
    font-size:clamp(11px,1.1vw,13px);font-weight:800;padding:3px 10px;border-radius:999px;
  }
  .name-tile .status-tag.출석{background:rgba(15,81,50,0.16);color:#0F5132;}
  .name-tile .status-tag.지각{background:rgba(255,182,72,0.15);color:var(--color-warning);}

  .empty-msg{
    color:var(--color-text-muted);font-size:clamp(14px,1.6vw,18px);
    text-align:center;padding:60px 20px;
  }

  /* ===== 확인 화면 ===== */
  #screen-confirm{align-items:center;justify-content:center;text-align:center;}
  .confirm-name{font-size:clamp(30px,5vw,56px);font-weight:900;margin-bottom:10px;}
  .confirm-sub{font-size:clamp(15px,2vw,20px);color:var(--color-text-muted);margin-bottom:clamp(28px,5vh,52px);}
  .confirm-buttons{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;width:100%;max-width:720px;}
  .big-btn{
    flex:1;min-width:220px;
    padding:clamp(28px,4vh,44px) 20px;
    border-radius:22px;
    border:none;
    font-size:clamp(20px,2.4vw,28px);
    font-weight:800;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    color:#161616;
  }
  .big-btn .emoji{font-size:clamp(30px,4vw,44px);}
  .big-btn.present{background:var(--color-success);}
  .big-btn.leave{background:var(--color-accent);}
  .cancel-link{
    margin-top:clamp(24px,4vh,40px);
    background:none;border:none;color:var(--color-text-muted);
    font-size:clamp(14px,1.6vw,17px);font-weight:600;
    padding:12px 20px;
  }

  /* ===== 완료/안내 화면 ===== */
  #screen-result{align-items:center;justify-content:center;text-align:center;}
  .result-icon{font-size:clamp(60px,8vw,100px);margin-bottom:14px;}
  .result-title{font-size:clamp(26px,4vw,42px);font-weight:900;margin-bottom:10px;}
  .result-sub{font-size:clamp(14px,1.8vw,19px);color:var(--color-text-muted);}
  .result-actions{display:flex;gap:14px;margin-top:clamp(24px,4vh,36px);}
  .ghost-btn{
    background:var(--color-surface);border:2px solid var(--color-border);color:var(--color-text);
    padding:14px 24px;border-radius:14px;font-size:clamp(14px,1.6vw,17px);font-weight:700;
  }

  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-thumb{background:var(--color-surface-alt);border-radius:10px;}
</style>
</head>
<body>

<!-- ===== 화면 1: 명단 선택 ===== -->
<div class="screen active" id="screen-list">
  <div class="header">
    <div class="header-brand">
      <div class="header-mark">
        <svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 14 L89 133 L11 133 Z" fill="#0A0A0A" stroke="#FFC531" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>
          <text x="50" y="110" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="46" fill="#FFFFFF">&#948;</text>
        </svg>
      </div>
      <div>
        <div class="header-title">델타수학 전문학원</div>
      </div>
    </div>
    <div class="header-center">출석 · 퇴근 시 이름을 눌러주세요</div>
    <div class="header-clock">
      <div class="header-time" id="clockTime">--:--</div>
      <div class="header-date" id="clockDate"></div>
    </div>
  </div>

  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 이름을 검색해보세요" oninput="renderGrid()">
  </div>

  <div class="grid-scroll">
    <div class="list-heading">출석체크</div>
    <div id="nameGrid"></div>
  </div>
</div>

<!-- ===== 화면 2: 등원/하원 선택 ===== -->
<div class="screen" id="screen-confirm">
  <div class="confirm-name" id="confirmName">이름</div>
  <div class="confirm-sub" id="confirmSub">등원/하원을 선택해주세요</div>
  <div class="confirm-buttons">
    <button class="big-btn present" onclick="doCheckIn()">
      <span class="emoji">✅</span>
      <span>출석 (등원)</span>
    </button>
    <button class="big-btn leave" onclick="doCheckOut()">
      <span class="emoji">🚪</span>
      <span>퇴근 (하원)</span>
    </button>
  </div>
  <button class="cancel-link" onclick="showList()">취소하고 돌아가기</button>
</div>

<!-- ===== 화면 3: 완료/안내 ===== -->
<div class="screen" id="screen-result">
  <div class="result-icon" id="resultIcon">🎉</div>
  <div class="result-title" id="resultTitle">출석 완료!</div>
  <div class="result-sub" id="resultSub"></div>
  <div class="result-actions" id="resultActions" style="display:none;">
    <button class="ghost-btn" onclick="showList()">확인</button>
    <button class="ghost-btn" onclick="goConfirmAgain()">다시 선택하기</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* =========================================================
   Firebase 연동 (관리자 프로그램과 동일한 프로젝트 사용)
========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyBE1kB8VFewPMwH2NXYV_G5iWDok7ynx3g",
  authDomain: "checkkkk-e5774.firebaseapp.com",
  databaseURL: "https://checkkkk-e5774-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "checkkkk-e5774",
  storageBucket: "checkkkk-e5774.firebasestorage.app",
  messagingSenderId: "378303125830",
  appId: "1:378303125830:web:d6ef8f50b79d83de1d2d47"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = [];
let attendance = [];
let selectedStudentId = null;
const WEEKDAYS = ['월','화','수','목','금','토','일'];
const JS_DAY_TO_LABEL = ['일','월','화','수','목','금','토'];

function snapshotToArray(snapVal){
  if(!snapVal) return [];
  return Object.entries(snapVal).map(([id, v]) => ({ id, ...v }));
}

db.ref('students').on('value', snap => {
  students = snapshotToArray(snap.val()).sort((a,b)=> a.name.localeCompare(b.name, 'ko'));
  renderGrid();
});
db.ref('attendance').on('value', snap => {
  attendance = snapshotToArray(snap.val());
  renderGrid();
});

function weekdayLabelOf(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return JS_DAY_TO_LABEL[d.getDay()];
}
// 학생의 오늘(해당 요일) 등원 시간. 그 요일에 스케줄이 없으면 null
function getDayTime(student, dayLabel){
  return (student.schedule && student.schedule[dayLabel]) || null;
}

function todayStr(){
  const d = new Date();
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function getTodayRecord(studentId){
  const date = todayStr();
  return attendance.find(a => a.studentId === studentId && a.date === date);
}
// 학년별 개별 파스텔 색상 (초등은 인원이 적어 한 가지 색으로 통일)
const GRADE_COLORS = {
  '중1': { bg:'#D6F5EC', text:'#1B6B5A' },
  '중2': { bg:'#EDE4FF', text:'#4C2A85' },
  '중3': { bg:'#FFD9E8', text:'#7A2E4D' },
  '고1': { bg:'#FFE8D6', text:'#7C4A1E' },
  '고2': { bg:'#FFF6C9', text:'#7A6300' },
  '고3': { bg:'#D6F3F3', text:'#1F6B6B' },
};
const ELEMENTARY_COLOR = { bg:'#DCEEFF', text:'#1E3A5F' };
const ETC_COLOR = { bg:'#E7E0F5', text:'#5B4B7A' };

function gradeColor(grade){
  if(!grade) return ETC_COLOR;
  if(grade.startsWith('초')) return ELEMENTARY_COLOR;
  return GRADE_COLORS[grade] || ETC_COLOR;
}
function hexToRgba(hex, alpha){
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// 등원 예정 시각까지 남은 시간이 30분 이내인지 (지난 시각도 true)
function isWithinCheckInWindow(scheduledTime){
  if(!scheduledTime) return true;
  const [h, m] = scheduledTime.split(':').map(Number);
  const target = new Date();
  target.setHours(h, m, 0, 0);
  const diffMin = (target - new Date()) / 60000;
  return diffMin <= 30;
}

/* ===== 시계 ===== */
function tickClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('clockTime').textContent = `${hh}:${mm}`;
  document.getElementById('clockDate').textContent = d.toLocaleDateString('ko-KR', { month:'long', day:'numeric', weekday:'long' });
}
tickClock();
setInterval(() => { tickClock(); if(!document.getElementById('searchInput').value.trim()) renderGrid(); }, 1000 * 30);

/* ===== 화면 전환 ===== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showList(){
  selectedStudentId = null;
  document.getElementById('searchInput').value = '';
  renderGrid();
  showScreen('screen-list');
}

/* ===== 명단 렌더 ===== */
function tileHtml(s){
  const rec = getTodayRecord(s.id);
  const checkedIn = !!(rec && rec.checkInTime && !rec.checkOutTime);
  const tag = checkedIn ? `<span class="status-tag 출석">등원 완료</span>` : '';
  const c = gradeColor(s.grade);
  const style = checkedIn ? '' : `style="background:${c.bg};"`;
  const nameStyle = checkedIn ? '' : `style="color:${c.text};"`;
  const badgeStyle = checkedIn ? '' : `style="background:${hexToRgba(c.text,0.14)};color:${c.text};"`;
  return `
    <button class="name-tile ${checkedIn ? 'checked' : ''}" ${style} onclick="selectStudent('${s.id}')">
      <span class="n" ${nameStyle}>${escapeHtml(s.name)}</span>
      <span class="g" ${badgeStyle}>${escapeHtml(s.grade)}</span>
      ${tag}
    </button>`;
}

function renderGrid(){
  const keyword = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  const grid = document.getElementById('nameGrid');
  const heading = document.querySelector('.list-heading');

  if(!students.length){
    if(heading) heading.style.display = 'none';
    grid.innerHTML = `<div class="empty-msg">등록된 학생이 없습니다.<br>관리자 프로그램에서 먼저 학생을 등록해 주세요.</div>`;
    return;
  }

  // 검색어가 있으면: 오늘 일정/시간과 상관없이 전체 학생 중에서 이름으로 찾기 (보강 학생용)
  // 단, 하원 완료한 학생은 검색에서도 숨김 (개인정보 보호)
  if(keyword){
    if(heading) heading.style.display = 'none';
    const list = students.filter(s => {
      if(!s.name.toLowerCase().includes(keyword)) return false;
      const rec = getTodayRecord(s.id);
      return !(rec && rec.checkOutTime);
    }).sort((a,b)=> a.name.localeCompare(b.name, 'ko'));
    grid.innerHTML = list.length
      ? `<div class="name-grid">${list.map(tileHtml).join('')}</div>`
      : `<div class="empty-msg">검색 결과가 없습니다.</div>`;
    return;
  }

  if(heading) heading.style.display = 'block';

  // 검색어가 없으면: 오늘 등원 예정 + 본인 등원 30분 전부터 표시, 하원 완료한 학생은 숨김
  const today = todayStr();
  const weekday = weekdayLabelOf(today);
  const visible = students.filter(s => {
    const rec = getTodayRecord(s.id);
    if(rec && rec.checkOutTime) return false; // 하원 완료 → 숨김
    const scheduledTime = getDayTime(s, weekday);
    if(!scheduledTime && !rec) return false; // 오늘 일정도 없고 기록도 없으면 표시 안 함
    if(rec) return true; // 이미 등원했으면 시간과 무관하게 계속 표시
    return isWithinCheckInWindow(scheduledTime); // 본인 등원 30분 전부터 표시
  });

  if(!visible.length){
    grid.innerHTML = `<div class="empty-msg">지금 등원 가능한 학생이 없습니다.<br>보강으로 오신 친구는 위 검색창에서 이름을 찾아주세요.</div>`;
    return;
  }

  // 시간 라벨은 화면에 표시하지 않고, 대기중 / 등원완료 두 그룹으로만 나눠 보여줌
  const scheduleOf = s => getDayTime(s, weekday) || '99:99';
  const waiting = visible.filter(s => !getTodayRecord(s.id))
    .sort((a,b)=> scheduleOf(a).localeCompare(scheduleOf(b)) || a.name.localeCompare(b.name,'ko'));
  const arrived = visible.filter(s => getTodayRecord(s.id))
    .sort((a,b)=> a.name.localeCompare(b.name,'ko'));

  let html = '';
  if(waiting.length) html += `<div class="name-grid">${waiting.map(tileHtml).join('')}</div>`;
  if(arrived.length){
    html += `<div class="subgroup-title">↓ 등원 완료</div><div class="name-grid">${arrived.map(tileHtml).join('')}</div>`;
  }
  grid.innerHTML = html;
}

/* ===== 학생 선택 ===== */
function selectStudent(id){
  selectedStudentId = id;
  const stu = students.find(s => s.id === id);
  if(!stu) return;

  document.getElementById('confirmName').textContent = stu.name;
  document.getElementById('confirmSub').textContent = '등원/하원을 선택해주세요';
  showScreen('screen-confirm');
}

function nowTimeStr(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function showResult(icon, title, sub, showActions){
  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultTitle').style.whiteSpace = 'normal';
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('resultActions').style.display = showActions ? 'flex' : 'none';
  showScreen('screen-result');
}

/* ===== 출석(등원) 기록 =====
   지각 여부는 학생에게 보여주지 않고, 관리자 화면에서만 확인할 수 있도록
   기준 시간과 비교해 자동으로 판정해서 저장합니다. */
function doCheckIn(){
  const stu = students.find(s => s.id === selectedStudentId);
  if(!stu) return;
  const date = todayStr();
  const time = nowTimeStr();
  const weekday = weekdayLabelOf(date);
  const cutoff = getDayTime(stu, weekday); // 오늘 요일에 스케줄이 없으면 null
  const status = (!cutoff || time <= cutoff) ? '출석' : '지각';
  const rec = getTodayRecord(stu.id);

  if(rec){
    db.ref('attendance/' + rec.id).update({ status, checkInTime: time });
  }else{
    db.ref('attendance').push({ studentId: stu.id, date, status, checkInTime: time, checkOutTime:'', memo:'' });
  }

  showResult('🎉', `${stu.name}님, 등원 확인되었습니다!`, '즐거운 수업 시간 보내세요 :)', false);
  clearTimeout(showResult._timer);
  showResult._timer = setTimeout(showList, 2500);
}

/* ===== 퇴근(하원) 기록 ===== */
function doCheckOut(){
  const stu = students.find(s => s.id === selectedStudentId);
  if(!stu) return;
  const date = todayStr();
  const time = nowTimeStr();
  const rec = getTodayRecord(stu.id);

  if(!rec || !rec.checkInTime){
    showResult('🙏', '먼저 출석(등원) 버튼을\n눌러주세요', '아직 오늘 등원 기록이 없어요.', true);
    document.getElementById('resultTitle').style.whiteSpace = 'pre-line';
    clearTimeout(showResult._timer);
    return;
  }

  db.ref('attendance/' + rec.id).update({ checkOutTime: time });
  showResult('👋', `${stu.name}님, 하원 확인되었습니다!`, '안녕히 가세요 :)', false);
  clearTimeout(showResult._timer);
  showResult._timer = setTimeout(showList, 2500);
}

function goConfirmAgain(){
  const stu = students.find(s => s.id === selectedStudentId);
  if(!stu) { showList(); return; }
  document.getElementById('confirmName').textContent = stu.name;
  document.getElementById('confirmSub').textContent = '등원/하원을 선택해주세요';
  showScreen('screen-confirm');
}
</script>
