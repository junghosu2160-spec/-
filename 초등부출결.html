<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초등부 출결 관리 · 델타수학 전문학원</title>
<style>
  :root{
    --color-bg:#F5F6FA;
    --color-surface:#FFFFFF;
    --color-surface-alt:#EEF1F7;
    --color-border:#E3E6ED;
    --color-primary:#161616;
    --color-accent:#FFC531;
    --color-accent-dark:#E6A800;
    --color-text:#1F2937;
    --color-text-muted:#6B7280;
    --color-success:#2E9E6C;
    --color-success-soft:#E4F5EC;
    --color-warning:#C98A2E;
    --color-warning-soft:#FBF0DE;
    --color-danger:#D64550;
    --color-danger-soft:#FBE7E8;
    --radius-sm:8px;
    --radius-md:12px;
    --radius-lg:18px;
    --font-sans:-apple-system,BlinkMacSystemFont,"Pretendard Variable",Pretendard,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

  .wrap{max-width:640px;margin:0 auto;padding:20px 16px 60px;}
  .header{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px;background:var(--color-primary);border-radius:var(--radius-lg);color:#fff;margin-bottom:16px;
  }
  .header-brand{display:flex;align-items:center;gap:10px;}
  .header-mark{width:26px;height:39px;flex-shrink:0;}
  .header-title{font-size:15px;font-weight:800;}
  .header-sub{font-size:11px;color:var(--color-accent);font-weight:600;margin-top:2px;}
  .header-right{text-align:right;}
  .header-date{font-size:12.5px;font-weight:700;}
  .header-sync{font-size:10.5px;margin-top:2px;}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .stat-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:14px;text-align:center;}
  .stat-card .label{font-size:11px;color:var(--color-text-muted);font-weight:700;}
  .stat-card .value{font-size:22px;font-weight:800;margin-top:4px;}
  .stat-card .value.success{color:var(--color-success);}
  .stat-card .value.muted{color:var(--color-text-muted);}

  .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;}
  .card-title{font-size:13.5px;font-weight:800;margin:0 0 10px 0;display:flex;align-items:center;justify-content:space-between;}
  .search-input{
    width:100%;padding:10px 14px;border:1px solid var(--color-border);border-radius:var(--radius-sm);
    font-size:13.5px;outline:none;
  }
  .search-input:focus{border-color:var(--color-accent-dark);box-shadow:0 0 0 3px rgba(255,197,49,0.18);}

  .stu-row{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);margin-bottom:8px;
    background:var(--color-surface);
  }
  .stu-row.checked-in{border-color:var(--color-success);background:var(--color-success-soft);}
  .stu-row.checked-out{opacity:0.6;}
  .stu-row.absent{border-color:var(--color-danger);background:var(--color-danger-soft);}
  .stu-name{flex:1 1 130px;display:flex;align-items:center;gap:8px;}
  .stu-name strong{font-size:14px;}
  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--color-surface-alt);color:var(--color-text-muted);}
  .time-box{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--color-text-muted);}
  .time-box input[type=time]{border:1px solid var(--color-border);border-radius:6px;padding:5px 6px;font-size:12px;width:88px;}
  .btn{
    padding:8px 14px;border-radius:8px;border:1px solid transparent;font-size:12.5px;font-weight:700;
    cursor:pointer;transition:filter .12s ease;
  }
  .btn:active{filter:brightness(0.94);}
  .btn-primary{background:var(--color-primary);color:#fff;}
  .btn-success{background:var(--color-success);color:#fff;}
  .btn-danger-outline{background:#fff;color:var(--color-danger);border-color:var(--color-danger-soft);}
  .btn-ghost{background:#fff;color:var(--color-text);border-color:var(--color-border);}
  .status-tag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;}
  .status-tag.대기{background:var(--color-surface-alt);color:var(--color-text-muted);}
  .status-tag.등원{background:var(--color-success-soft);color:var(--color-success);}
  .status-tag.지각{background:var(--color-warning-soft);color:var(--color-warning);}
  .status-tag.결석{background:var(--color-danger-soft);color:var(--color-danger);}
  .status-tag.하원{background:var(--color-surface-alt);color:var(--color-text-muted);}

  .empty-msg{color:var(--color-text-muted);font-size:13px;text-align:center;padding:24px;}
  .hint{font-size:11px;color:var(--color-text-muted);margin-top:10px;line-height:1.6;}
  .director-note-banner{
    background:#FFF6DC;border:1px solid var(--color-accent-dark);border-radius:var(--radius-md);
    padding:12px 14px;margin-bottom:16px;
  }
  .director-note-banner .label{font-size:11px;font-weight:800;color:var(--color-accent-dark);margin-bottom:4px;}
  .director-note-banner .text{font-size:13.5px;color:#4A3A00;line-height:1.5;}
  .memo-pin{
    font-size:11.5px;font-weight:700;color:var(--color-accent-dark);
    background:#FFF6DC;padding:5px 10px;border-radius:8px;
  }
  .daily-note-textarea{
    width:100%;min-height:80px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-sm);
    font-size:13.5px;line-height:1.6;resize:vertical;font-family:inherit;
  }
  .daily-note-saved{font-size:11px;color:var(--color-success);margin-top:6px;display:none;}
  /* ===== 출근 달력 ===== */
  .work-cal-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:16px;margin-bottom:14px;}
  .work-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .work-cal-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px;}
  .work-cal-nav{display:flex;align-items:center;gap:6px;}
  .work-cal-nav button{background:none;border:1px solid var(--color-border);border-radius:6px;padding:3px 9px;font-size:14px;cursor:pointer;color:var(--color-text);}
  .work-cal-month{font-size:13px;font-weight:700;min-width:60px;text-align:center;color:var(--color-text-muted);}
  .work-cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
  .work-cal-weekdays span{text-align:center;font-size:10px;font-weight:700;padding:2px 0;color:var(--color-text-muted);}
  .work-cal-weekdays span.sun{color:#D64550;}
  .work-cal-weekdays span.sat{color:#378ADD;}
  .work-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .wc-day{min-height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--color-text-muted);}
  .wc-day.work{background:#EAF3DE;color:#27500A;font-weight:800;}
  .wc-day.today-ring{outline:2px solid #2E9E6C;outline-offset:-2px;}
  .wc-day.sun-num{color:#D64550;}
  .wc-day.sat-num{color:#378ADD;}
  .work-cal-legend{display:flex;align-items:center;gap:6px;margin-top:10px;}
  .work-cal-legend .dot{width:10px;height:10px;border-radius:3px;background:#EAF3DE;border:1px solid #C0DD97;flex-shrink:0;}
  .work-cal-legend span{font-size:11px;color:var(--color-text-muted);}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="header-brand">
      <div class="header-mark">
        <svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg"><path d="M50 14 L89 133 L11 133 Z" fill="#0A0A0A" stroke="#FFC531" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/><text x="50" y="110" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="46" fill="#FFFFFF">&#948;</text></svg>
      </div>
      <div>
        <div class="header-title">델타수학 전문학원</div>
        <div class="header-sub">초등부 출결 관리</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-date" id="todayDate">-</div>
      <div class="header-sync" id="syncStatus">🔄 연결 중...</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="label">오늘 등원 예정</div>
      <div class="value" id="statExpected">0</div>
    </div>
    <div class="stat-card">
      <div class="label">등원 완료</div>
      <div class="value success" id="statCheckedIn">0</div>
    </div>
    <div class="stat-card">
      <div class="label">하원 완료</div>
      <div class="value muted" id="statCheckedOut">0</div>
    </div>
  </div>

  <div class="card">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 이름으로 검색 (오늘 예정 없는 학생도 찾을 수 있어요)" oninput="renderList()">
  </div>

  <div id="directorNoteBanner" style="display:none;"></div>

  <div class="card" id="elemAbsenceCard" style="display:none;">
    <div class="card-title">결석 학생 · 학부모님 전달사항</div>
    <div id="elemAbsenceList"></div>
  </div>

  <div class="work-cal-card">
    <div class="work-cal-header">
      <div class="work-cal-title">📅 이번 달 출근 일정</div>
      <div class="work-cal-nav">
        <button onclick="shiftWorkCal(-1)">‹</button>
        <span class="work-cal-month" id="workCalMonthLabel">-</span>
        <button onclick="shiftWorkCal(1)">›</button>
      </div>
    </div>
    <div class="work-cal-weekdays">
      <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
    </div>
    <div class="work-cal-grid" id="workCalGrid"></div>
    <div class="work-cal-legend">
      <div class="dot"></div>
      <span>초록색 날이 출근일이에요</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">오늘 수업 특이사항 <span style="font-size:11px;color:var(--color-text-muted);font-weight:400;">원장님 대시보드에 전달돼요</span></div>
    <textarea id="dailyNoteTextarea" class="daily-note-textarea" placeholder="예: 오늘 OO 학생이 컨디션이 안 좋아 보였어요."></textarea>
    <button class="btn btn-primary" onclick="saveDailyNote()" style="margin-top:8px;">저장</button>
    <div class="daily-note-saved" id="dailyNoteSavedMsg">✓ 저장되었습니다.</div>
  </div>

  <div class="card">
    <div class="card-title">오늘의 초등부 학생</div>
    <div id="studentList"></div>
    <p class="hint">이 페이지에서 체크하면 원장님 관리자 페이지와 학생용 태블릿에 실시간으로 똑같이 반영돼요. 등원·하원 시간은 옆의 시간 칸을 직접 눌러서 수정할 수도 있어요.</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBE1kB8VFewPMwH2NXYV_G5iWDok7ynx3g",
  authDomain: "checkkkk-e5774.firebaseapp.com",
  databaseURL: "https://checkkkk-e5774-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "checkkkk-e5774",
  storageBucket: "checkkkk-e5774.firebasestorage.app",
  messagingSenderId: "378303125830",
  appId: "1:378303125830:web:d6ef8f50b79d83de1d2d47"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const WEEKDAYS = ['월','화','수','목','금','토','일'];
const JS_DAY_TO_LABEL = ['일','월','화','수','목','금','토'];

let students = [];
let attendance = [];
let wcTeachers = [];
let wcExceptions = [];
let elemMakeupProgress = [];
let parentMessages = [];
let elemPendingAdjust = {};

/* ===== 출근 달력 ===== */
let workCalYear = new Date().getFullYear();
let workCalMonth = new Date().getMonth();
const WC_WEEKDAYS_LABEL = ['일','월','화','수','목','금','토'];
const WC_DAY_NAMES = ['일','월','화','수','목','금','토'];

function shiftWorkCal(delta){
  workCalMonth += delta;
  if(workCalMonth < 0){ workCalMonth = 11; workCalYear--; }
  if(workCalMonth > 11){ workCalMonth = 0; workCalYear++; }
  renderWorkCal();
}

// 초등부 선생님(장자엽 선생님 — teachers 컬렉션에서 name에 '장자엽' 포함된 첫 번째)
function getElementaryTeacher(){
  return wcTeachers.find(t => (t.name||'').includes('장자엽')) || null;
}

function isWcTeacherWorking(teacher, dateStr){
  const exc = wcExceptions.find(e => e.teacherId === teacher.id && e.date === dateStr);
  if(exc) return exc.status === 'on';
  const d = new Date(dateStr + 'T00:00:00');
  const label = WC_DAY_NAMES[d.getDay()];
  return (teacher.days || []).includes(label);
}

function renderWorkCal(){
  const label = document.getElementById('workCalMonthLabel');
  const grid = document.getElementById('workCalGrid');
  const cardEl = document.querySelector('.work-cal-card');
  if(!label || !grid) return;

  label.textContent = `${workCalYear}년 ${workCalMonth + 1}월`;

  const teacher = getElementaryTeacher();

  // 안내 메시지 표시/숨김
  let noticeEl = document.getElementById('workCalNotice');
  if(!noticeEl){
    noticeEl = document.createElement('div');
    noticeEl.id = 'workCalNotice';
    noticeEl.style.cssText = 'font-size:12px;color:var(--color-warning);background:var(--color-warning-soft);border-radius:8px;padding:8px 11px;margin-bottom:10px;';
    grid.parentNode.insertBefore(noticeEl, grid);
  }
  if(!teacher){
    noticeEl.style.display = 'block';
    noticeEl.textContent = '⚠️ "장자엽" 이름의 선생님을 찾을 수 없어요. 원장님 프로그램의 [직원 관리] 탭에서 선생님을 등록해 주세요 (이름에 "장자엽"이 포함되어야 자동으로 연결돼요).';
  }else{
    noticeEl.style.display = 'none';
  }

  const todayStr2 = (() => {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  })();

  const firstDay = new Date(workCalYear, workCalMonth, 1).getDay();
  const daysInMonth = new Date(workCalYear, workCalMonth + 1, 0).getDate();

  let html = '';
  let workCount = 0;
  for(let i = 0; i < firstDay; i++) html += `<div class="wc-day"></div>`;
  for(let d = 1; d <= daysInMonth; d++){
    const dateStr = `${workCalYear}-${String(workCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(dateStr + 'T00:00:00').getDay();
    const isToday = dateStr === todayStr2;
    const working = teacher ? isWcTeacherWorking(teacher, dateStr) : false;
    if(working) workCount++;
    let cls = 'wc-day';
    if(working) cls += ' work';
    else if(dow === 0) cls += ' sun-num';
    else if(dow === 6) cls += ' sat-num';
    if(isToday) cls += ' today-ring';
    html += `<div class="${cls}">${d}</div>`;
  }
  grid.innerHTML = html;

  // 선생님은 찾았는데 이번 달 출근일이 0일인 경우 안내
  if(teacher && workCount === 0){
    noticeEl.style.display = 'block';
    noticeEl.textContent = `⚠️ ${teacher.name} 선생님의 ${workCalMonth+1}월 출근일이 아직 설정되지 않았어요. 원장님 프로그램 [직원 관리] 탭에서 기본 출근 요일을 체크해 주세요.`;
  }
}

// 초등부 선생님 달력은 현재 달로 초기화
renderWorkCal();

function snapshotToArray(snapVal){
  if(!snapVal) return [];
  return Object.entries(snapVal).map(([id, v]) => ({ id, ...v }));
}

db.ref('teachers').on('value', snap => {
  wcTeachers = snapshotToArray(snap.val());
  renderWorkCal();
});
db.ref('teacherExceptions').on('value', snap => {
  wcExceptions = snapshotToArray(snap.val());
  renderWorkCal();
});
db.ref('students').on('value', snap => {
  students = snapshotToArray(snap.val()).sort((a,b)=> a.name.localeCompare(b.name,'ko'));
  renderList();
  renderElemAbsenceList();
});
db.ref('attendance').on('value', snap => {
  attendance = snapshotToArray(snap.val());
  renderList();
  renderElemAbsenceList();
});
db.ref('elemMakeupProgress').on('value', snap => {
  elemMakeupProgress = snapshotToArray(snap.val());
  renderElemAbsenceList();
});
db.ref('parentMessages').on('value', snap => {
  parentMessages = snapshotToArray(snap.val());
  renderElemAbsenceList();
});
db.ref('.info/connected').on('value', snap => {
  const el = document.getElementById('syncStatus');
  if(snap.val() === true){ el.textContent = '🟢 실시간 동기화 중'; }
  else{ el.textContent = '🔴 연결 대기 중...'; }
});

// 원장님이 오늘 보낸 전달사항을 실시간으로 받아서 배너로 표시
db.ref('directorNotes/' + todayStr()).on('value', snap => {
  const data = snap.val();
  const banner = document.getElementById('directorNoteBanner');
  if(data && data.note){
    banner.style.display = 'block';
    banner.innerHTML = `
      <div class="director-note-banner">
        <div class="label">📢 원장님 전달사항</div>
        <div class="text">${escapeHtml(data.note)}</div>
      </div>`;
  }else{
    banner.style.display = 'none';
    banner.innerHTML = '';
  }
});

// 오늘 수업 특이사항 불러오기 (날짜별로 저장)
function loadDailyNote(){
  db.ref('dailyNotes/' + todayStr()).once('value').then(snap => {
    const data = snap.val();
    document.getElementById('dailyNoteTextarea').value = (data && data.note) || '';
  });
}
function saveDailyNote(){
  const note = document.getElementById('dailyNoteTextarea').value.trim();
  db.ref('dailyNotes/' + todayStr()).set({ date: todayStr(), note, updatedAt: Date.now() });
  const savedMsg = document.getElementById('dailyNoteSavedMsg');
  savedMsg.style.display = 'block';
  setTimeout(() => { savedMsg.style.display = 'none'; }, 2000);
}
loadDailyNote();

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function nowTimeStr(){
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function weekdayLabelOf(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return JS_DAY_TO_LABEL[d.getDay()];
}
function getDayTime(student, dayLabel){
  return (student.schedule && student.schedule[dayLabel]) || null;
}
function getDayDuration(student, dayLabel){
  return (student.scheduleDuration && student.scheduleDuration[dayLabel]) || 60;
}
function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function getTodayRecord(studentId){
  const date = todayStr();
  return attendance.find(a => a.studentId === studentId && a.date === date);
}
function isElementary(student){
  return (student.grade || '').startsWith('초');
}

function tickDate(){
  const d = new Date();
  document.getElementById('todayDate').textContent = d.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
}
tickDate();
setInterval(() => { tickDate(); if(!document.getElementById('searchInput').value.trim()) renderList(); }, 1000 * 30);

function checkIn(studentId){
  const stu = students.find(s => s.id === studentId);
  if(!stu) return;
  const date = todayStr();
  const time = nowTimeStr();
  const weekday = weekdayLabelOf(date);
  const scheduled = getDayTime(stu, weekday);
  const status = (!scheduled || time <= scheduled) ? '출석' : '지각';
  const rec = getTodayRecord(studentId);
  if(rec){
    db.ref('attendance/' + rec.id).update({ status, checkInTime: time });
  }else{
    db.ref('attendance').push({ studentId, date, status, checkInTime: time, checkOutTime:'', memo:'' });
  }
}

function checkOut(studentId){
  const rec = getTodayRecord(studentId);
  const time = nowTimeStr();
  if(rec){
    db.ref('attendance/' + rec.id).update({ checkOutTime: time });
  }else{
    db.ref('attendance').push({ studentId, date: todayStr(), status:'출석', checkInTime: time, checkOutTime: time, memo:'' });
  }
}

function markAbsent(studentId){
  const rec = getTodayRecord(studentId);
  if(rec){
    db.ref('attendance/' + rec.id).update({ status:'결석' });
  }else{
    db.ref('attendance').push({ studentId, date: todayStr(), status:'결석', checkInTime:'', checkOutTime:'', memo:'' });
  }
}

function editCheckInTime(studentId, value){
  if(!value) return;
  const rec = getTodayRecord(studentId);
  if(rec){
    db.ref('attendance/' + rec.id).update({ checkInTime: value });
  }else{
    db.ref('attendance').push({ studentId, date: todayStr(), status:'출석', checkInTime: value, checkOutTime:'', memo:'' });
  }
}
function editCheckOutTime(studentId, value){
  if(!value) return;
  const rec = getTodayRecord(studentId);
  if(rec){
    db.ref('attendance/' + rec.id).update({ checkOutTime: value });
  }else{
    db.ref('attendance').push({ studentId, date: todayStr(), status:'출석', checkInTime:'', checkOutTime: value, memo:'' });
  }
}

function rowHtml(stu){
  const rec = getTodayRecord(stu.id);
  const status = rec ? rec.status : null;
  let rowClass = '';
  let statusTag = `<span class="status-tag 대기">대기중</span>`;
  if(status === '결석'){ rowClass = 'absent'; statusTag = `<span class="status-tag 결석">결석</span>`; }
  else if(rec && rec.checkOutTime){ rowClass = 'checked-out'; statusTag = `<span class="status-tag 하원">하원 완료</span>`; }
  else if(rec && rec.checkInTime){ rowClass = 'checked-in'; statusTag = status === '지각' ? `<span class="status-tag 지각">지각</span>` : `<span class="status-tag 등원">등원 완료</span>`; }
  else if(rec && status){ rowClass = 'checked-in'; statusTag = `<span class="status-tag 등원">${escapeHtml(status)} 처리됨 (시간 미기록)</span>`; }

  return `
    <div class="stu-row ${rowClass}">
      <div class="stu-name">
        <strong>${escapeHtml(stu.name)}</strong>
        <span class="badge">${escapeHtml(stu.grade)}</span>
        ${statusTag}
      </div>
      <div class="time-box">
        등원 <input type="time" value="${rec && rec.checkInTime ? rec.checkInTime : ''}" onchange="editCheckInTime('${stu.id}', this.value)">
        하원 <input type="time" value="${rec && rec.checkOutTime ? rec.checkOutTime : ''}" onchange="editCheckOutTime('${stu.id}', this.value)">
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
        ${!rec || !rec.checkInTime ? `<button class="btn btn-success" onclick="checkIn('${stu.id}')">등원 체크</button>` : ''}
        ${rec && rec.checkInTime && !rec.checkOutTime ? `<button class="btn btn-primary" onclick="checkOut('${stu.id}')">하원 체크</button>` : ''}
        ${status !== '결석' ? `<button class="btn btn-danger-outline" onclick="markAbsent('${stu.id}')">결석 처리</button>` : ''}
        ${stu.memo && stu.memo.trim() ? `<span class="memo-pin">📌 ${escapeHtml(stu.memo)}</span>` : ''}
      </div>
    </div>`;
}

function renderList(){
  const box = document.getElementById('studentList');
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  const today = todayStr();
  const weekday = weekdayLabelOf(today);

  const elementaryStudents = students.filter(isElementary);

  let list;
  if(keyword){
    list = elementaryStudents.filter(s => s.name.toLowerCase().includes(keyword));
  }else{
    list = elementaryStudents.filter(s => getDayTime(s, weekday) || getTodayRecord(s.id));
  }
  list = list.sort((a,b)=> a.name.localeCompare(b.name,'ko'));

  // 통계 (오늘 등원 예정 기준, 검색과 무관하게 항상 오늘 기준으로 계산)
  const expectedToday = elementaryStudents.filter(s => getDayTime(s, weekday) || getTodayRecord(s.id));
  const checkedIn = expectedToday.filter(s => { const r = getTodayRecord(s.id); return r && r.checkInTime; }).length;
  const checkedOut = expectedToday.filter(s => { const r = getTodayRecord(s.id); return r && r.checkOutTime; }).length;
  document.getElementById('statExpected').textContent = expectedToday.length;
  document.getElementById('statCheckedIn').textContent = checkedIn;
  document.getElementById('statCheckedOut').textContent = checkedOut;

  if(!elementaryStudents.length){
    box.innerHTML = `<div class="empty-msg">등록된 초등부 학생이 없습니다.</div>`;
    return;
  }
  if(!list.length){
    box.innerHTML = `<div class="empty-msg">${keyword ? '검색 결과가 없습니다.' : '오늘(' + weekday + '요일) 등원 예정인 초등부 학생이 없습니다.'}</div>`;
    return;
  }

  box.innerHTML = list.map(rowHtml).join('');
}

/* ===== 결석 학생 · 학부모님 전달사항 · 보강 진행(5분 단위) ===== */
function elemAbsenceKey(studentId, date){ return studentId + '_' + date; }

function getElemProgress(studentId, date){
  return elemMakeupProgress.find(p => p.studentId === studentId && p.date === date);
}

function fmtDateKR3(dateStr){
  const [y,m,d] = dateStr.split('-');
  return `${parseInt(m,10)}월 ${parseInt(d,10)}일(${weekdayLabelOf(dateStr)})`;
}

function renderElemAbsenceList(){
  const card = document.getElementById('elemAbsenceCard');
  const box = document.getElementById('elemAbsenceList');
  if(!card || !box) return;

  const d14 = new Date(); d14.setDate(d14.getDate() - 14);
  const start = `${d14.getFullYear()}-${String(d14.getMonth()+1).padStart(2,'0')}-${String(d14.getDate()).padStart(2,'0')}`;
  const end = todayStr();

  const list = attendance
    .filter(a => a.status === '결석' && a.date >= start && a.date <= end)
    .map(a => ({ ...a, stu: students.find(s => s.id === a.studentId) }))
    .filter(a => a.stu && isElementary(a.stu))
    .sort((a,b) => b.date.localeCompare(a.date));

  if(!list.length){ card.style.display = 'none'; return; }
  card.style.display = 'block';

  box.innerHTML = list.map(a => {
    const weekday = weekdayLabelOf(a.date);
    const target = getDayDuration(a.stu, weekday);
    const progress = getElemProgress(a.studentId, a.date);
    const logged = progress ? Math.min(progress.loggedMinutes || 0, target) : 0;
    const key = elemAbsenceKey(a.studentId, a.date);
    const step = elemPendingAdjust[key] || 5;
    const done = logged >= target;

    const msgs = parentMessages.filter(m => m.studentId === a.studentId).sort((x,y) => x.createdAt - y.createdAt);
    const lastParentMsg = [...msgs].reverse().find(m => m.from === 'parent');

    return `
      <div style="background:#FFF6DC;border:1px solid var(--color-accent);border-radius:12px;padding:12px 14px;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:800;color:var(--color-text);margin-bottom:4px;">${escapeHtml(a.stu.name)} · ${fmtDateKR3(a.date)} 결석</div>
        ${a.memo ? `<div style="font-size:12.5px;color:#4A3A00;margin-bottom:8px;">${escapeHtml(a.memo)}</div>` : ''}

        <div style="display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:8px;padding:9px 12px;margin-bottom:8px;">
          <span style="font-size:12.5px;color:var(--color-text);">보강 목표 ${target}분 중 ${logged}분 적립${done ? ' (완료)' : ''}</span>
          ${!done ? `
          <div style="display:flex;align-items:center;gap:6px;">
            <button onclick="adjustElemStep('${key}',-5)" style="background:var(--color-surface-alt);border:1px solid var(--color-border);color:var(--color-text);width:26px;height:26px;padding:0;border-radius:6px;font-size:14px;">-</button>
            <span style="font-size:13px;font-weight:800;width:32px;text-align:center;">${step}분</span>
            <button onclick="adjustElemStep('${key}',5)" style="background:var(--color-surface-alt);border:1px solid var(--color-border);color:var(--color-text);width:26px;height:26px;padding:0;border-radius:6px;font-size:14px;">+</button>
            <button class="btn btn-primary" style="padding:6px 10px;font-size:11.5px;" onclick="saveElemMakeup('${a.studentId}','${a.date}',${target})">반영</button>
          </div>` : ''}
        </div>

        ${msgs.length ? `
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;">
          ${msgs.map(m => `
            <div style="font-size:12px;padding:7px 10px;border-radius:8px;background:${m.from === 'staff' ? '#fff' : '#FFFFFF'};border:1px solid var(--color-border);">
              <b>${m.from === 'staff' ? '선생님' : '학부모'}</b> · ${escapeHtml(m.text)}
            </div>`).join('')}
        </div>` : ''}

        <div style="display:flex;gap:6px;">
          <input type="text" id="reply-${a.studentId}" placeholder="답장 입력..." style="flex:1;padding:7px 10px;border:1px solid var(--color-border);border-radius:8px;font-size:12.5px;">
          <button class="btn btn-primary" style="padding:7px 12px;font-size:12px;" onclick="sendElemReply('${a.studentId}')">답장</button>
        </div>
      </div>`;
  }).join('');
}

function adjustElemStep(key, delta){
  const cur = elemPendingAdjust[key] || 5;
  elemPendingAdjust[key] = Math.max(5, cur + delta);
  renderElemAbsenceList();
}

function saveElemMakeup(studentId, date, target){
  const key = elemAbsenceKey(studentId, date);
  const step = elemPendingAdjust[key] || 5;
  const existing = getElemProgress(studentId, date);
  const prevLogged = existing ? (existing.loggedMinutes || 0) : 0;
  const newLogged = Math.min(prevLogged + step, target);
  const log = existing && existing.log ? existing.log.slice() : [];
  log.push({ minutes: step, at: Date.now(), sessionDate: todayStr() });
  if(existing){
    db.ref('elemMakeupProgress/' + existing.id).update({ loggedMinutes: newLogged, log });
  }else{
    db.ref('elemMakeupProgress').push({ studentId, date, targetMinutes: target, loggedMinutes: newLogged, log, createdAt: Date.now() });
  }
  delete elemPendingAdjust[key];
}

function sendElemReply(studentId){
  const input = document.getElementById('reply-' + studentId);
  const text = input.value.trim();
  if(!text) return;
  db.ref('parentMessages').push({ studentId, from: 'staff', text, createdAt: Date.now(), read: true });
  input.value = '';
}
</script>
